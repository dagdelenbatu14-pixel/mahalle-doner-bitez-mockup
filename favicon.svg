<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- cream background -->
  <circle cx="32" cy="32" r="30" fill="#f5e8d0"/>

  <!-- foil cap on top of skewer -->
  <rect x="28" y="9" width="8" height="5" rx="1.2" fill="#2a1810"/>

  <!-- skewer rod (visible above and below) -->
  <line x1="32" y1="14" x2="32" y2="56" stroke="#2a1810" stroke-width="2" stroke-linecap="round"/>

  <!-- döner meat — tapered conical shape (wider top, narrower bottom) -->
  <path d="M 20 14
           Q 20 13 21 13
           L 43 13
           Q 44 13 44 14
           L 39 50
           Q 38.5 51.5 37 51.5
           L 27 51.5
           Q 25.5 51.5 25 50
           Z" fill="#b8412a"/>

  <!-- darker shadow on right side for 3D depth -->
  <path d="M 32 13
           L 43 13
           Q 44 13 44 14
           L 39 50
           Q 38.5 51.5 37 51.5
           L 32 51.5
           Z" fill="#8e2f1d" opacity="0.45"/>

  <!-- subtle highlight stripe on left side -->
  <path d="M 22 16
           L 25 16
           L 23 48
           L 21 48
           Z" fill="#d65a3f" opacity="0.45"/>

  <!-- shaved meat slivers at bottom right (just hint of slicing) -->
  <path d="M 40 47 L 47 50 L 46 52 L 39 50 Z" fill="#b8412a" opacity="0.8"/>
  <path d="M 41 50 L 47 52 L 45 53.5 L 40 52 Z" fill="#8e2f1d" opacity="0.7"/>
</svg>
